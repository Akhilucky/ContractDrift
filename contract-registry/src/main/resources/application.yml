server:
  port: 8083

spring:
  application:
    name: contract-registry
  datasource:
    url: jdbc:postgresql://localhost:5432/contract_drift
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.contractsentinel: INFO
    org.springframework: WARN

sentinel:
  auth:
    jwt-secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}
