route:
  receiver: "slack-critical"
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: P1
      receiver: "slack-critical"
      repeat_interval: 1h
    - match:
        severity: P2
      receiver: "slack-warning"
      repeat_interval: 4h

receivers:
  - name: "slack-critical"
    slack_configs:
      - api_url: ""
        channel: "#contract-drift-p1"
        title: '🚨 {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: danger

  - name: "slack-warning"
    slack_configs:
      - api_url: ""
        channel: "#contract-drift-warnings"
        title: '⚠️ {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: warning
