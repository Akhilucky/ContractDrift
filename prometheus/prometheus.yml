global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: "sidecar-agent"
    static_configs:
      - targets: ["sidecar-agent:8090"]

  - job_name: "ingestion-service"
    static_configs:
      - targets: ["ingestion-service:8081"]

  - job_name: "drift-detector"
    static_configs:
      - targets: ["drift-detector:8082"]

  - job_name: "contract-registry"
    static_configs:
      - targets: ["contract-registry:8083"]

  - job_name: "promotion-gate"
    static_configs:
      - targets: ["promotion-gate:8084"]

  - job_name: "correlation-engine"
    static_configs:
      - targets: ["correlation-engine:8085"]
