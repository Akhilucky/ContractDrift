server:
  port: 8082

spring:
  application:
    name: drift-detector
  datasource:
    url: jdbc:postgresql://localhost:5432/contract_drift
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
  data:
    redis:
      host: localhost
      port: 6379

drift:
  detection:
    interval-ms: 60000
    rate-limit: 10
    thread-pool-size: 4
  kafka:
    topic: contract-violations
  registry:
    base-url: http://localhost:8080
  contract-pairs:
    - contract-id: "00000000-0000-0000-0000-000000000001"
      provider: "payment-service"
      consumer: "order-service"
      endpoint: "/api/v1/charge"
      method: "POST"

logging:
  level:
    com.contractsentinel: INFO
    org.springframework: WARN

sentinel:
  auth:
    jwt-secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}
